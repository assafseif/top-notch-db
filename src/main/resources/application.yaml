spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=topnotchdb;encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:P@ssw0rd}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.microsoft.sqlserver.jdbc.SQLServerDriver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.SQLServerDialect}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    drop-first: ${SPRING_LIQUIBASE_DROP_FIRST:false}
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: ${SPRING_JACKSON_SERIALIZATION_WRITE_DATES_AS_TIMESTAMPS:false}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:topnotchSecretKey}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://109.205.180.47:89}
  security:
    auth:
      max-failed-attempts: ${APP_SECURITY_AUTH_MAX_FAILED_ATTEMPTS:5}
      lockout-minutes: ${APP_SECURITY_AUTH_LOCKOUT_MINUTES:15}
    rate-limit:
      requests: ${APP_SECURITY_RATE_LIMIT_REQUESTS:120}
      window-seconds: ${APP_SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}
    bulkhead:
      max-concurrent-requests: ${APP_SECURITY_BULKHEAD_MAX_CONCURRENT_REQUESTS:100}

# NOTE: For local development it is OK to set trustServerCertificate=true (accept self-signed certs).
# For production, import the SQL Server certificate into the JVM truststore and do NOT use trustServerCertificate=true.
